# Cephalopod self-host stack. Run: docker compose up --build
# The brain exposes the WS sync relay (7700) and the HTTP API (7701).
# Data (CRDT log, snapshots, derived index, auth) persists in a named volume.
#
# On first start the brain prints a one-time bootstrap admin token in the logs:
#   docker compose logs brain | grep "bootstrap admin token"
#
# The MCP server is NOT a long-running service — agent hosts launch it over stdio
# (see mcp/README.md), pointed at this brain with an agent token.
services:
  brain:
    build: ./brain
    container_name: cephalopod-brain
    # bound to loopback by default for a self-host build; drop the 127.0.0.1
    # prefix (or front it with a TLS-terminating reverse proxy) to expose remotely
    ports:
      - "127.0.0.1:7700:7700" # WebSocket sync relay
      - "127.0.0.1:7701:7701" # HTTP query/command API
    volumes:
      - cephalopod-data:/data
    environment:
      CEPH_DB: /data/brain.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7701/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cephalopod-data:
