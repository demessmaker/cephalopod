<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🐙 Cephalopod Explorer</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- build-less, but vendored SAME-ORIGIN (no third-party CDN, no SRI gap): Yjs +
         awareness are committed under src/vendor/ and served by our own static
         server. Regenerate after a version bump with `npm run vendor` (the pins in
         web/package.json are the source of truth; tests resolve the same bytecode
         from node_modules). awareness's internal `import "yjs"` resolves through this
         same map to the ONE vendored Yjs. -->
    <script type="importmap">
      {
        "imports": {
          "yjs": "/vendor/yjs.js",
          "y-protocols/awareness": "/vendor/y-protocols-awareness.js"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <strong>🐙 Cephalopod</strong>
      <input id="token" type="password" placeholder="agent/user token (cph_…)" size="20" />
      <input id="space" placeholder="space" size="8" />
      <input id="ws" placeholder="ws://localhost:7700" size="18" />
      <button id="connect">Connect</button>
      <span id="status" class="muted"></span>
    </header>

    <div id="searchbar">
      <input id="q" placeholder="search the knowledge graph…" />
      <select id="mode">
        <option value="hybrid">hybrid</option>
        <option value="text">text</option>
        <option value="semantic">semantic</option>
      </select>
      <button id="go">Search</button>
      <button id="review-btn" title="Notes awaiting human review">⚑ Review</button>
    </div>

    <main>
      <aside id="results"><p class="muted">Connect, then search to explore.</p></aside>
      <section id="canvas"><svg id="graph"></svg></section>
      <aside id="note"><p class="muted">Click a node to read it.</p></aside>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
